name: big_cart
description: A fresh grocery delivery app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # State Management
  provider: ^6.1.2

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  photo_view: ^0.14.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.2
  confetti: ^0.7.0

  # Utils
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.3
  share_plus: ^10.0.0
  local_auth: ^2.3.0
  package_info_plus: ^8.0.2
  app_links: ^6.3.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Splash
  flutter_native_splash: ^2.3.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/app_logo.png
  android_12:
    image: assets/icons/app_logo.png
    icon_background_color: "#FFFFFF"
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/